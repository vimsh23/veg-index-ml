# render.yaml — Deploy backend to Render free tier
# https://render.com/docs/render-yaml-reference

services:
  - type: web
    name: veg-index-ml-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    envVars:
      - key: MODEL_PATH
        value: /app/model/rf_model.joblib
    disk:
      name: model-storage
      mountPath: /app/model
      sizeGB: 1
    healthCheckPath: /health
